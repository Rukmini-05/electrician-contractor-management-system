<!DOCTYPE html>
<html>
<head>
    <title>Materials</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <!-- ADD MATERIAL -->
    <h2 class="text-center text-dark mb-4">Add Material</h2>

    <form action="/add_material" method="POST" class="card p-4 shadow-sm">

        <div class="mb-3">
            <input type="text" name="name" class="form-control" placeholder="Material Name" required>
        </div>

        <div class="mb-3">
            <input type="number" name="quantity" class="form-control" placeholder="Quantity" required>
        </div>

        <button type="submit" class="btn btn-dark w-100">Add Material</button>
    </form>

    <hr class="my-5">

    <!-- MATERIAL LIST -->
    <h2 class="text-center text-success mb-4">All Materials</h2>

    <div class="table-responsive">
        <table class="table table-bordered table-striped shadow-sm">

            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Quantity</th>
                </tr>
            </thead>

            <tbody>
                {% for m in materials %}
                <tr>
                    <td>{{ m[0] }}</td>
                    <td>{{ m[1] }}</td>
                    <td>
                        <span class="badge bg-primary">{{ m[2] }}</span>
                    </td>
                </tr>
                {% endfor %}
            </tbody>

        </table>
    </div>

</div>

</body>
</html>

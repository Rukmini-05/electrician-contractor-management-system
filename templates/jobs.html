<!DOCTYPE html>
<html>
<head>
    <title>Jobs</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
        }
        table tr:hover {
            background-color: #f2f2f2;
            transition: 0.3s;
        }
    </style>
</head>

<body class="bg-light">

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
<div class="container">
    <a class="navbar-brand">⚡ EMS</a>

    <div>
        <a href="/dashboard.html" class="btn btn-outline-light btn-sm">Dashboard</a>
        <a href="/electricians.html" class="btn btn-outline-light btn-sm">Electricians</a>
        <a href="/jobs" class="btn btn-outline-light btn-sm">Jobs</a>
        <a href="/tasks" class="btn btn-outline-light btn-sm">Tasks</a>
        <a href="/materials" class="btn btn-outline-light btn-sm">Materials</a>
        <a href="/reports" class="btn btn-outline-light btn-sm">Reports</a>
        <a href="/" class="btn btn-warning btn-sm">Logout</a>
    </div>
</div>
</nav>

<div class="container mt-4">

    <!-- HEADER -->
    <h2 class="text-center text-primary fw-bold">⚡ Job Management</h2>
    <p class="text-center text-muted">Assign and manage jobs efficiently</p>

    <!-- ADD JOB FORM -->
    <div class="card shadow-lg p-4 mb-5">
        <h5 class="mb-3">Add Job</h5>

        <form action="/add_job" method="POST">

            <div class="mb-3">
                <input type="text" name="title" class="form-control" placeholder="Job Title" required>
            </div>

            <div class="mb-3">
                <input type="text" name="description" class="form-control" placeholder="Description" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Select Electrician</label>
                <select name="electrician_id" class="form-select" required>
                    {% for e in electricians %}
                        <option value="{{ e[0] }}">{{ e[1] }}</option>
                    {% endfor %}
                </select>
            </div>

            <button type="submit" class="btn btn-primary w-100">Add Job</button>
        </form>
    </div>

    <!-- JOB LIST -->
    <div class="card shadow-lg p-4">
        <h5 class="mb-3 text-success">All Jobs</h5>

        <div class="table-responsive">
            <table class="table table-hover table-bordered">

                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Title</th>
                        <th>Description</th>
                        <th>Electrician</th>
                        <th>Status</th>
                    </tr>
                </thead>

                <tbody>
                    {% for job in jobs %}
                    <tr>
                        <td>{{ job[0] }}</td>
                        <td>{{ job[1] }}</td>
                        <td>{{ job[2] }}</td>
                        <td>{{ job[4] }}</td>
                        <td>
                            <span class="badge bg-warning text-dark">{{ job[3] }}</span>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>

            </table>
        </div>
    </div>

</div>

</body>
</html>

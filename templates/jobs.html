<!DOCTYPE html>
<html>
<head>
    <title>Jobs</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <!-- ADD JOB -->
    <h2 class="text-center text-primary mb-4">Add Job</h2>

    <form action="/add_job" method="POST" class="card p-4 shadow-sm">

        <div class="mb-3">
            <input type="text" name="title" class="form-control" placeholder="Job Title" required>
        </div>

        <div class="mb-3">
            <input type="text" name="description" class="form-control" placeholder="Description" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Select Electrician</label>
            <select name="electrician_id" class="form-select" required>
                {% for e in electricians %}
                    <option value="{{ e[0] }}">{{ e[1] }}</option>
                {% endfor %}
            </select>
        </div>

        <button type="submit" class="btn btn-primary w-100">Add Job</button>
    </form>

    <hr class="my-5">

    <!-- JOB LIST -->
    <h2 class="text-center text-success mb-4">All Jobs</h2>

    <!-- 🔍 SEARCH BOX -->
    <div class="mb-3">
        <input type="text" id="searchInput" class="form-control" placeholder="Search Job Title...">
    </div>

    <div class="table-responsive">
        <table id="jobsTable" class="table table-bordered table-striped shadow-sm">

            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Title</th>
                    <th>Description</th>
                    <th>Electrician</th>
                    <th>Status</th>
                </tr>
            </thead>

            <tbody>
                {% for job in jobs %}
                <tr>
                    <td>{{ job[0] }}</td>
                    <td>{{ job[1] }}</td>
                    <td>{{ job[2] }}</td>
                    <td>{{ job[4] }}</td>
                    <td>
                        <span class="badge bg-warning text-dark">{{ job[3] }}</span>
                    </td>
                </tr>
                {% endfor %}
            </tbody>

        </table>
    </div>

</div>

<!-- 🔍 SEARCH SCRIPT -->
<script>
document.getElementById("searchInput").addEventListener("keyup", function() {
    let input = this.value.toLowerCase();
    let rows = document.querySelectorAll("#jobsTable tbody tr");

    rows.forEach(row => {
        let title = row.cells[1].innerText.toLowerCase();

        if (title.includes(input)) {
            row.style.display = "";
        } else {
            row.style.display = "none";
        }
    });
});
</script>

</body>
</html>

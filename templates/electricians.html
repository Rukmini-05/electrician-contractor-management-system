<input type="text" id="searchElectrician" class="form-control mb-3" placeholder="Search Electrician...">

<script>
document.getElementById("searchElectrician").addEventListener("keyup", function() {
let input = this.value.toLowerCase();
let rows = document.querySelectorAll("table tbody tr");

rows.forEach(row => {
let name = row.cells[1].innerText.toLowerCase();

row.style.display = name.includes(input) ? "" : "none";
});
});
</script>

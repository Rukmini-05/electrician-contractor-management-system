<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Electricians</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<!-- Navbar -->
<nav class="navbar navbar-dark bg-primary">
<div class="container">

<a class="navbar-brand">Electrician Management System</a>

<div>
<a href="dashboard.html" class="btn btn-light">Dashboard</a>
<a href="index.html" class="btn btn-warning">Logout</a>
</div>

</div>
</nav>

<div class="container mt-5">

<h2 class="mb-4">Electrician Management</h2>

<table class="table table-bordered table-striped">

<thead class="table-dark">

<tr>
<th>ID</th>
<th>Name</th>
<th>Phone</th>
<th>Email</th>
<th>Status</th>
<th>Actions</th>
</tr>

</thead>

<tbody>

{% for e in electricians %}
<tr>
<td>{{ e[0] }}</td>
<td>{{ e[1] }}</td>
<td>{{ e[2] }}</td>
<td>{{ e[3] }}</td>
<td>Active</td>
<td>
<button class="btn btn-warning btn-sm" disabled>Edit</button>   
<a href="/delete/{{ e[0] }}" class="btn btn-danger btn-sm">Delete</a>
<a href="/" class="btn btn-warning">Logout</a>

</td>

</tr>
{% endfor %}

</tbody>

</table>

</div>

</body>
</html>

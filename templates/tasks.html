<!DOCTYPE html>
<html>
<head>
    <title>Tasks</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        select {
            height: 40px;   /* FIXES BIG DROPDOWN ISSUE */
        }
    </style>
</head>

<body class="bg-light">

<div class="container mt-5">

    <!-- ADD TASK -->
    <h2 class="text-center text-success mb-4">Add Task</h2>

    <form action="/add_task" method="POST" class="card p-4 shadow-sm">

        <div class="mb-3">
            <label class="form-label">Select Job</label>
            <select name="job_id" class="form-select" required>
                {% for job in jobs %}
                    <option value="{{ job[0] }}">{{ job[1] }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="mb-3">
            <input type="text" name="task_name" class="form-control" placeholder="Task Name" required>
        </div>

        <button type="submit" class="btn btn-success w-100">Add Task</button>
    </form>

    <hr class="my-5">

    <!-- FILTER -->
    <div class="row mb-3">
        <div class="col-md-4">
            <select id="taskFilter" class="form-select">
                <option value="">All Tasks</option>
                <option value="Pending">Pending</option>
                <option value="Completed">Completed</option>
            </select>
        </div>
    </div>

    <!-- TASK LIST -->
    <h2 class="text-center text-primary mb-4">All Tasks</h2>

    <div class="table-responsive">
        <table class="table table-bordered table-striped shadow-sm">

            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Task</th>
                    <th>Job</th>
                    <th>Status</th>
                </tr>
            </thead>

            <tbody>
                {% for task in tasks %}
                <tr>
                    <td>{{ task[0] }}</td>
                    <td>{{ task[1] }}</td>
                    <td>{{ task[3] }}</td>
                    <td>
                        <span class="badge bg-info text-dark">{{ task[2] }}</span>
                    </td>
                </tr>
                {% endfor %}
            </tbody>

        </table>
    </div>

</div>

<!-- FILTER SCRIPT -->
<script>
document.getElementById("taskFilter").addEventListener("change", function() {
    let value = this.value.toLowerCase();
    let rows = document.querySelectorAll("table tbody tr");

    rows.forEach(row => {
        let status = row.cells[3].innerText.toLowerCase();

        if (value === "" || status.includes(value)) {
            row.style.display = "";
        } else {
            row.style.display = "none";
        }
    });
});
</script>

</body>
</html>

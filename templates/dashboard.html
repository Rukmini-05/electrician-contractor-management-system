<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<!-- Navbar -->

<nav class="navbar navbar-dark bg-primary">
<div class="container">

<a class="navbar-brand">Electrician Management System</a>

<a href="index.html" class="btn btn-light">Logout</a>

</div>
</nav>


<div class="container mt-5">

<h2 class="mb-4">Dashboard</h2>

<div class="row">

<!-- Total Electricians -->

<div class="col-md-3">

<div class="card text-white bg-primary mb-3">

<div class="card-body">
<h5>Total Electricians</h5>
<h2>{{ total_users }}</h2>
</div>

</div>

</div>


<!-- Active Jobs -->

<div class="col-md-3">

<div class="card text-white bg-success mb-3">

<div class="card-body">
<h5>Active Jobs</h5>
<h2>12</h2>
</div>

</div>

</div>


<!-- Pending Tasks -->

<div class="col-md-3">

<div class="card text-dark bg-warning mb-3">

<div class="card-body">
<h5>Pending Tasks</h5>
<h2>8</h2>
</div>

</div>

</div>


<!-- Completed Work -->

<div class="col-md-3">

<div class="card text-white bg-info mb-3">

<div class="card-body">
<h5>Completed Work</h5>
<h2>30</h2>
</div>

<div class="alert alert-info text-center">
🔔 New Task Assigned | ⚡ Job Updated | ✅ Task Completed
</div>

</div>

</div>

</div>

</div>

</body>
</html>
